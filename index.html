<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="growMate is a mobile marketplace where plant lovers buy, sell, trade, showcase their gardens, and climb friendly community leaderboards."
    />
    <link rel="icon" type="image/png" href="/growmate-logo.png" />
    <title>growMate | Plant Marketplace Mobile App</title>
    <style>
      .gm-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e8f0df;
        color: #203522;
        font-family: Inter, Arial, sans-serif;
      }

      .gm-boot-card {
        display: grid;
        justify-items: center;
        gap: 16px;
      }

      .gm-boot-logo-wrap {
        position: relative;
        display: grid;
        height: 124px;
        width: 124px;
        place-items: center;
      }

      .gm-boot-logo-wrap::before {
        position: absolute;
        inset: 0;
        border: 4px solid rgba(32, 53, 34, 0.1);
        border-top-color: #8bc34a;
        border-radius: 32px;
        content: "";
        animation: gm-boot-spin 1.2s linear infinite;
      }

      .gm-boot-logo {
        height: 96px;
        width: 96px;
        border-radius: 26px;
        box-shadow: 0 20px 54px rgba(37, 61, 41, 0.16);
      }

      .gm-boot-text {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 48px;
        border-radius: 24px;
        background: white;
        padding: 0 22px;
        box-shadow: 0 20px 60px rgba(37, 61, 41, 0.12);
        font-size: 14px;
        font-weight: 900;
      }

      .gm-boot-dot {
        height: 5px;
        width: 5px;
        border-radius: 999px;
        background: #8bc34a;
        animation: gm-boot-dot 1s ease-in-out infinite;
      }

      .gm-boot-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .gm-boot-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes gm-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes gm-boot-dot {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }

        50% {
          opacity: 1;
          transform: translateY(-4px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="gm-boot" role="status" aria-live="polite" aria-label="Loading GrowMate">
        <div class="gm-boot-card">
          <div class="gm-boot-logo-wrap">
            <img class="gm-boot-logo" src="/growmate-logo.png" alt="GrowMate logo" />
          </div>
          <div class="gm-boot-text">
            <span>Loading GrowMate</span>
            <span class="gm-boot-dot"></span>
            <span class="gm-boot-dot"></span>
            <span class="gm-boot-dot"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
